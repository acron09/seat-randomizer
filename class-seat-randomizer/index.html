<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>우리반 자리 뽑기</title>

<link rel="stylesheet" href="style.css">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body>

<h1>우리반 자리 뽑기</h1>

<div class="controls">

행
<input type="number" id="rows" value="5">

열
<input type="number" id="cols" value="6">

출석번호 시작
<input type="number" id="startNum" value="1">

출석번호 끝
<input type="number" id="endNum" value="30">

<br><br>

<button id="generate">좌석 생성</button>
<button id="randomize">랜덤 배치</button>
<button id="reshuffle">다시 섞기</button>
<button id="saveImage">이미지 저장</button>

<br><br>

특정 좌석 번호 (쉼표)

<input type="text" id="specialNumbers" placeholder="예: 7,12,8,9">

</div>

<div id="seatArea"></div>

<div class="teacher">교탁</div>

<script src="script.js"></script>

<p class="guide">
좌석 클릭 → 제외 좌석 | Shift + 클릭 → 특정 좌석 (앞자리용) | 번호 있는 좌석 2개 클릭 → 자리 교체
</p>

</body>
</html>
